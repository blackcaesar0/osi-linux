# OSI Linux tmux config

# Prefix: Ctrl+a (matches screen convention, easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config in-place
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Mouse support
set -g mouse on

# Vi keys in copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Pane splitting — stay in current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation — vim-style
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window numbering starts at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Long scrollback history
set -g history-limit 50000

# No delay on Escape (important for vim inside tmux)
set -s escape-time 0

# Status bar — OSI black/white theme
set -g status-style "bg=#000000,fg=#e0e0e0"
set -g status-left-length 40
set -g status-right-length 60
set -g status-left  "#[fg=#ffffff,bold][#S] "
set -g status-right "#[fg=#888888]%Y-%m-%d #[fg=#ffffff,bold]%H:%M #[fg=#888888]| #[fg=#e0e0e0]#H"
set -g status-justify left

setw -g window-status-style         "fg=#888888"
setw -g window-status-current-style "fg=#ffffff,bold"
setw -g window-status-format         " #I:#W "
setw -g window-status-current-format " #I:#W "

set -g pane-border-style        "fg=#2a2a2a"
set -g pane-active-border-style "fg=#ffffff"
set -g message-style            "bg=#000000,fg=#ffffff"

# 256-color support
set -g default-terminal "screen-256color"
