# OSI Linux tmux config — cyberpunk theme

# Prefix: Ctrl+a (matches screen convention, easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config in-place
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Mouse support
set -g mouse on

# Vi keys in copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Pane splitting — stay in current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation — vim-style
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window numbering starts at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Long scrollback history
set -g history-limit 50000

# No delay on Escape (important for vim inside tmux)
set -s escape-time 0

# Status bar — cyberpunk theme
set -g status-position bottom
set -g status-style "bg=#0a0a0f,fg=#c0caf5"
set -g status-left-length 40
set -g status-right-length 80

set -g status-left "\
#[bg=#00ffcc,fg=#0a0a0f,bold] #S \
#[bg=#1a1b2e,fg=#00ffcc] \
#[bg=#1a1b2e,fg=#565f89] #(whoami) \
#[bg=#0a0a0f,fg=#1a1b2e]"

set -g status-right "\
#[fg=#1a1b2e]#[bg=#1a1b2e,fg=#565f89] %Y-%m-%d \
#[fg=#00ffcc,bold] %H:%M \
#[bg=#00ffcc,fg=#0a0a0f,bold] #H "

set -g status-justify left

# Window tabs
setw -g window-status-separator ""
setw -g window-status-style "fg=#565f89,bg=#0a0a0f"
setw -g window-status-current-style "fg=#00ffcc,bg=#1a1b2e,bold"
setw -g window-status-format         "  #I:#W  "
setw -g window-status-current-format "  #I:#W  "
setw -g window-status-activity-style "fg=#f7768e"
setw -g window-status-bell-style     "fg=#e0af68"

# Pane borders
set -g pane-border-style        "fg=#1a1b2e"
set -g pane-active-border-style "fg=#00ffcc"

# Messages and command line
set -g message-style        "bg=#1a1b2e,fg=#00ffcc,bold"
set -g message-command-style "bg=#1a1b2e,fg=#7b68ee"

# Copy mode highlight
setw -g mode-style "bg=#00ffcc,fg=#0a0a0f"

# Clock
setw -g clock-mode-colour "#00ffcc"

# 256-color + true color support
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",alacritty:RGB"
