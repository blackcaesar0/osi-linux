backend = "glx";
glx-no-stencil = true;
vsync = true;

shadow = true;
shadow-radius = 6;
shadow-opacity = 0.4;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "_GTK_FRAME_EXTENTS@:c"
];

fading = false;

inactive-opacity = 1.0;
active-opacity   = 1.0;
frame-opacity    = 1.0;
blur-background  = false;
corner-radius    = 0;

mark-wmwin-focused    = true;
mark-ovredir-focused  = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient      = true;
detect-client-leader  = true;
use-damage            = true;
log-level             = "warn";
