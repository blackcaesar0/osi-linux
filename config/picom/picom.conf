backend = "glx";
glx-no-stencil = true;
vsync = true;

# Shadows — subtle cyan-tinted glow
shadow          = true;
shadow-radius   = 14;
shadow-opacity  = 0.35;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-color    = "#001a1a";
shadow-exclude  = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'slop'",
    "_GTK_FRAME_EXTENTS@:c"
];

# Fading — smooth window transitions
fading          = true;
fade-in-step    = 0.06;
fade-out-step   = 0.06;
fade-delta      = 5;
no-fading-openclose = false;

# Opacity
inactive-opacity = 0.92;
active-opacity   = 1.0;
frame-opacity    = 0.9;
inactive-opacity-override = false;

# Blur — dual_kawase is fastest on GPU, falls back to gaussian if unavailable.
# If picom crashes on startup, set blur-method to "none" or "gaussian".
blur-background       = true;
blur-method           = "dual_kawase";
blur-strength         = 4;
blur-background-fixed = false;
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'slop'",
    "_GTK_FRAME_EXTENTS@:c"
];

# Rounded corners
corner-radius = 8;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
];

# Detection
mark-wmwin-focused    = true;
mark-ovredir-focused  = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient      = true;
detect-client-leader  = true;
use-damage            = true;
log-level             = "warn";

# Window type overrides
wintypes:
{
    tooltip       = { fade = true; shadow = true; opacity = 0.95; };
    dock          = { shadow = false; };
    dnd           = { shadow = false; };
    popup_menu    = { opacity = 0.95; };
    dropdown_menu = { opacity = 0.95; };
};
