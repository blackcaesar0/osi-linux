[window]
padding = { x = 12, y = 10 }
decorations = "none"
opacity = 0.92
dynamic_title = true

[font]
normal  = { family = "Hack", style = "Regular" }
bold    = { family = "Hack", style = "Bold" }
italic  = { family = "Hack", style = "Italic" }
size    = 11.0

[colors.primary]
background = "#0a0a0f"
foreground = "#c0caf5"

[colors.cursor]
text   = "#0a0a0f"
cursor = "#00ffcc"

[colors.vi_mode_cursor]
text   = "#0a0a0f"
cursor = "#7b68ee"

[colors.selection]
text       = "#c0caf5"
background = "#1a1b2e"

[colors.search.matches]
foreground = "#0a0a0f"
background = "#00ffcc"

[colors.normal]
black   = "#12121a"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#c0caf5"

[colors.bright]
black   = "#565f89"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#00ffcc"
white   = "#ffffff"

[cursor]
style = { shape = "Block", blinking = "Off" }

[scrolling]
history = 10000

[selection]
save_to_clipboard = true
