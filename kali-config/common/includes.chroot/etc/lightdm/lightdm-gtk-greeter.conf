#
# OSI Linux — LightDM GTK greeter (cyber-noir, B&W)
#
# Monochrome login screen: black background with the OSI-Noir wallpaper,
# Hack font, no user image, no clock fanfare. Matches the desktop theme.
#
[greeter]
background = /usr/share/backgrounds/osi/osi.png
default-user-image = #avatar-default-symbolic
hide-user-image = true
theme-name = OSI-Noir
icon-theme-name = Papirus-Dark
font-name = Hack 11
xft-antialias = true
xft-hintstyle = hintslight
xft-rgba = rgb
indicators = ~spacer;~clock;~spacer;~session;~language;~a11y;~power
clock-format = %Y-%m-%d  %H:%M
position = 50%,center 50%,center
screensaver-timeout = 60
# pure black fallback if the wallpaper file is unreadable
active-monitor = #cursor
panel-position = top
